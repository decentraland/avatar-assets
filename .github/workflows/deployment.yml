name: Deploy All Base Wearables

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Branch to deploy from'
        required: true
      environment:
        description: 'Target environment'
        required: true
        default: 'zone'
        type: choice
        options:
          - zone
          - peer-testing

jobs:
  deploy-wearables:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch_name }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Set target URL
        run: |
          if [ "${{ github.event.inputs.environment }}" = "zone" ]; then
            echo "TARGET_URL=https://peer.decentraland.zone" >> $GITHUB_ENV
          else
            echo "TARGET_URL=https://peer-testing.decentraland.org" >> $GITHUB_ENV
          fi

      - name: Generate identity.json
        env:
          PRIVATE_KEY: ${{ secrets.ZONE_PRIVATE_KEY }}
          ETH_ADDRESS: ${{ secrets.ZONE_PUBLIC_KEY }}
        run: |
          echo "{\"privateKey\": \"$PRIVATE_KEY\", \"ethAddress\": \"$ETH_ADDRESS\"}" > identity.json

      - name: Deploy All Wearables
        run: |
          for collection_dir in assets/*/; do
            collection=$(basename "$collection_dir")
            while IFS= read -r asset_dir; do
              asset_json="$asset_dir/asset.json"
              asset_name=""
              if [ -f "$asset_json" ]; then
                asset_name=$(grep -o '"name": "[^"]*"' "$asset_json" | head -1 | sed 's/"name": "//g' | sed 's/"//g')
              fi
              if [ -z "$asset_name" ]; then
                asset_name=$(basename "$asset_dir")
              fi
              echo "Deploying dcl://$collection/$asset_name"
              yarn run deploy -- \
                --identityFilePath identity.json \
                --target $TARGET_URL \
                --id "dcl://$collection/$asset_name"
            done < <(find "$collection_dir" -type d -mindepth 2 -maxdepth 2 | sort)
          done

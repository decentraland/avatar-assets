name: Deploy All Base Emotes

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Branch to deploy from'
        required: true
      environment:
        description: 'Target environment'
        required: true
        default: 'zone'
        type: choice
        options:
          - zone
          - peer-testing
          - production

jobs:
  deploy-emotes:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch_name }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Set target URL
        run: |
          if [ "${{ github.event.inputs.environment }}" = "production" ]; then
            echo "TARGET_URL=https://peer.decentraland.org" >> $GITHUB_ENV
          elif [ "${{ github.event.inputs.environment }}" = "zone" ]; then
            echo "TARGET_URL=https://peer.decentraland.zone" >> $GITHUB_ENV
          else
            echo "TARGET_URL=https://peer-testing.decentraland.org" >> $GITHUB_ENV
          fi

      - name: Generate identity.json
        env:
          PRIVATE_KEY: ${{ secrets.ZONE_PRIVATE_KEY }}
          ETH_ADDRESS: ${{ secrets.ZONE_PUBLIC_KEY }}
        run: |
          echo "{\"privateKey\": \"$PRIVATE_KEY\", \"ethAddress\": \"$ETH_ADDRESS\"}" > identity.json

      - name: Deploy All Emotes
        run: |
          EMOTE_DIRS=$(find emotes/base-emotes -maxdepth 1 -mindepth 1 -type d | sort | tr '\n' ' ')
          yarn run emotes --deploy --target $TARGET_URL --identityFilePath identity.json $EMOTE_DIRS

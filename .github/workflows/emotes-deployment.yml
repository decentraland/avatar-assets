name: Deploy Emotes to Peer

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Branch to deploy from'
        required: true
      environment:
        description: 'Target environment'
        required: true
        default: 'zone'
        type: choice
        options:
          - zone
          - peer-testing

jobs:
  deploy-emotes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch_name }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Set target URL
        run: |
          if [ "${{ github.event.inputs.environment }}" = "zone" ]; then
            echo "TARGET_URL=https://peer.decentraland.zone" >> $GITHUB_ENV
          else
            echo "TARGET_URL=https://peer-testing.decentraland.org" >> $GITHUB_ENV
          fi

      - name: Deploy All Emotes
        run: |
          EMOTE_DIRS=$(find emotes/base-emotes -maxdepth 1 -mindepth 1 -type d | sort | tr '\n' ' ')
          yarn run emotes --deploy --target $TARGET_URL \
            --privateKey ${{ secrets.ZONE_PRIVATE_KEY }} \
            --publicKey ${{ secrets.ZONE_PUBLIC_KEY }} \
            $EMOTE_DIRS
